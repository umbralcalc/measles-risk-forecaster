iterations:
# A single UTLA's measles outbreak as a branching process. One importation seeds
# it (init_state [infectious=1, cumulative=1]); each step is one generation.
# Vary `susceptibility` to explore the risk surface; an ensemble over `seed`
# gives the cluster-size distribution (this is the WASM dashboard's engine).
- name: branching
  params:
    r0: [15.0]
    susceptibility: [0.2]
    dispersion: [0.5]
    outbreak_cap: [5000.0]
  init_state_values: [1.0, 1.0]
  seed: 1
  state_width: 2
  state_history_depth: 2

init_time_value: 0.0
timesteps_history_depth: 2
